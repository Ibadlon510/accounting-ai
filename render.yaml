# Render Blueprint — use "New > Blueprint" and point at this repo.
databases:
  - name: accounting-ai-db
    plan: free
    region: oregon
    postgresMajorVersion: 16

services:
  - type: web
    name: accounting-ai
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: accounting-ai-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      # AUTH_URL must be set manually in Dashboard after first deploy:
      # e.g. https://accounting-ai.onrender.com
      - key: AUTH_URL
        value: "https://agaraccounting.com"
      - key: NEXTAUTH_URL
        value: "https://agaraccounting.com"
      # Also set in Render Dashboard: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
      # GOOGLE_GEMINI_API_KEY, OPENAI_API_KEY, RESEND_API_KEY, AWS_* keys,
      # STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET,
      # STRIPE_PRICE_PRO_MONTHLY, STRIPE_PRICE_PRO_ANNUAL, STRIPE_PRICE_EXTRA_SEAT,
      # STRIPE_PRICE_TOKEN_TOPUP
